name: Build Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.0'
          channel: stable
          cache: true

      - name: Install Android NDK
        run: |
          echo "y" | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager \
            "ndk;27.0.12077973" \
            "platforms;android-35" \
            "build-tools;35.0.0"

      - name: Flutter pub get
        working-directory: and433_app
        run: flutter pub get

      - name: Generate signing keystore
        run: |
          keytool -genkeypair \
            -alias and433 \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -keystore and433_app/android/app/and433.jks \
            -storepass and433release \
            -keypass and433release \
            -dname "CN=And433, OU=And433, O=And433, L=Unknown, ST=Unknown, C=US"

      - name: Configure signing
        run: |
          cat >> and433_app/android/app/build.gradle <<'EOF'

          android.signingConfigs {
              release {
                  storeFile file("and433.jks")
                  storePassword "and433release"
                  keyAlias "and433"
                  keyPassword "and433release"
              }
          }
          android.buildTypes.release.signingConfig = android.signingConfigs.release
          EOF

      - name: Build release APK
        working-directory: and433_app
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_SDK_ROOT }}/ndk/27.0.12077973
        run: flutter build apk --release

      - name: Rename APK
        run: |
          TAG="${GITHUB_REF_NAME:-dev}"
          cp and433_app/build/app/outputs/flutter-apk/app-release.apk \
             and433_app/build/app/outputs/flutter-apk/and433-${TAG}.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: and433-apk
          path: and433_app/build/app/outputs/flutter-apk/and433-*.apk
          retention-days: 90

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: and433_app/build/app/outputs/flutter-apk/and433-*.apk
          generate_release_notes: true
